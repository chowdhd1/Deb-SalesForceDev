<template>
    <template lwc:if={isCheckout}>
    <div class={_wrapClass}>     
        <div class="slds-grid slds-wrap slds-gutters_x-small slds-var-p-left_medium slds-var-p-right_medium slds-var-p-top_medium">
            <div class="slds-col slds-size_12-of-12" lwc:ref="referenceColumn" onresize={handleResize}>
                <c-review-products site={_site} metadata={metadataReviewProducts} metadata-header={metadataReviewProductHeader} metadata-header-review={metadataReviewProductHeaderreview}
                    metadata-header-table={metadataReviewProductTable} metadata-header-footer={metadataReviewProductfooter} step={currentStep}
                    action={reviewProductsActionHandler} input-action={reviewProductsInputActionHandler} current-cart={currentCart}
                    cart-id={currentCartId} company-id={companyId} order-id={orderId} order-date={orderDate} 
                    shipping-enable={_showterms} lwc:ref="review"></c-review-products>
                
                <template lwc:if={_showterms}>
                    <c-order-terms site={_site} metadata={metadataOrderTerms} class="slds-p-top_medium" 
                        action={termsActionHandler} input-action={termsInputActionHandler}
                        outline-checkboxes={outlineCheckboxes}></c-order-terms>  
                </template>
            </div>
            <template if:true={currentCartId}>
            <div class="slds-col slds-size_12-of-12">
                <c-order-summary site={_site} metadata={metadataSummary} metadata-sum-review={metadataSummaryReview}
                metadata-ordreview={metadataSummaryOrdReview} step={currentStep} 
                    action={summaryActionHandler} input-action={summaryInputActionHandler}                     
                    company-id={companyId} contact-id={contactId} address-id={addressId} style={_summaryStyle}
                    cart-id={currentCartId} start-stop-spinner={startStopSpinnerHandler} create-message={createMessageHandler}
                    refresh-request={refreshRequestHandler} refresh={refresh} status={status} is-grower={isGrower} 
                    order-id={orderId} terms-ok={termsOk} shipping-notes={shippingNote}
                    lwc:ref="summary" review-ok={reviewOk} place-order-dt={placeOrderDt}></c-order-summary>
            </div>
            </template>
        </div>
    </div>

    <template lwc:if={_showMsg}>
        <c-message site={_site} left-button-title={_msgLeftButton} right-button-title={_msgRightButton}
          message-title={_msgTitle} richtext={_msgText} icon={_msgIcon}
          left-click={msgLeftClickHandler} right-click={msgRightClickHandler} 
          message-closed={closeMsgHandler} hide-close></c-message>
    </template>    

    <template lwc:if={showSpinner}>
        <c-my-spinner site={_site} funcs={funcs} ></c-my-spinner>
    </template>
    </template>
    <template lwc:else>
         <c-cart-status-comp cart-id={currentCartId} company-id={companyId} review-cartheader-meta-definition-unique-key={reviewCartheaderMetaDefinitionUniqueKey}
        review-cart-table-meta-definition-unique-key={reviewCartTableMetaDefinitionUniqueKey}
        review-cartfooter-meta-definition-unique-key={reviewCartfooterMetaDefinitionUniqueKey}
        review-cart-confirm-unique-key={reviewCartConfirmUniqueKey}>
        </c-cart-status-comp>
    </template>
</template>
